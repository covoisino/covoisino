workflows:
  ios-workflow:
    name: iOS Workflow
    environment:
      ios_signing:
        # your signing configuration
      flutter: stable
      xcode: latest
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages pub get
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios && pod install
      
      - name: Ensure Swift is included
        script: |
          # Create bridging header if it doesn't exist
          if [ ! -f "ios/Runner/Runner-Bridging-Header.h" ]; then
            echo "// Bridging header for Swift" > ios/Runner/Runner-Bridging-Header.h
          fi
          
      - name: Flutter build
        script: |
          flutter build ios --release --no-codesign